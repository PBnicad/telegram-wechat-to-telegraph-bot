name: Deploy to Cloudflare Workers

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Target service (dashboard):
# https://dash.cloudflare.com/23d4ff7e591eac740c917b5ab1ba23d3/workers/services/view/telegram-wechat-bot/production
env:
  CLOUDFLARE_ACCOUNT_ID: 23d4ff7e591eac740c917b5ab1ba23d3

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate code
        run: |
          node -c src/index.js
          node -c src/handlers/message.js
          node -c src/handlers/inline.js
          node -c src/services/workers-ai.js
          node -c src/services/telegraph.js
          node -c src/services/telegram.js
          node -c src/services/wechat-parser.js
          node -c src/utils/wechat-utils.js

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Bound to dashboard service telegram-wechat-bot (see wrangler.toml account_id)
          accountId: "23d4ff7e591eac740c917b5ab1ba23d3"
          command: deploy

      - name: Set up secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "23d4ff7e591eac740c917b5ab1ba23d3"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAPH_ACCESS_TOKEN: ${{ secrets.TELEGRAPH_ACCESS_TOKEN }}
        run: |
          echo "Setting up Cloudflare Workers secrets on telegram-wechat-bot..."

          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            echo "Setting TELEGRAM_BOT_TOKEN..."
            echo "$TELEGRAM_BOT_TOKEN" | npx wrangler secret put TELEGRAM_BOT_TOKEN --name telegram-wechat-bot
          else
            echo "Warning: TELEGRAM_BOT_TOKEN not found in GitHub secrets"
          fi

          if [ -n "$TELEGRAPH_ACCESS_TOKEN" ]; then
            echo "Setting TELEGRAPH_ACCESS_TOKEN..."
            echo "$TELEGRAPH_ACCESS_TOKEN" | npx wrangler secret put TELEGRAPH_ACCESS_TOKEN --name telegram-wechat-bot
          else
            echo "TELEGRAPH_ACCESS_TOKEN not set (optional - will auto-create)"
          fi

      - name: Get deployment info
        id: deployment
        run: |
          # workers.dev URL uses account subdomain; nicad is the known subdomain for this project
          WORKER_URL="https://telegram-wechat-bot.nicad.workers.dev"
          echo "worker_url=$WORKER_URL" >> $GITHUB_OUTPUT
          echo "webhook_url=$WORKER_URL" >> $GITHUB_OUTPUT
          echo "dashboard_url=https://dash.cloudflare.com/23d4ff7e591eac740c917b5ab1ba23d3/workers/services/view/telegram-wechat-bot/production" >> $GITHUB_OUTPUT

      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Worker:** \`telegram-wechat-bot\`" >> $GITHUB_STEP_SUMMARY
          echo "**Account ID:** \`23d4ff7e591eac740c917b5ab1ba23d3\`" >> $GITHUB_STEP_SUMMARY
          echo "**Worker URL:** ${{ steps.deployment.outputs.worker_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Dashboard:** ${{ steps.deployment.outputs.dashboard_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Set up Telegram webhook:" >> $GITHUB_STEP_SUMMARY
          echo '   ```bash' >> $GITHUB_STEP_SUMMARY
          echo '   curl -X POST "https://api.telegram.org/botYOUR_BOT_TOKEN/setWebhook" \\' >> $GITHUB_STEP_SUMMARY
          echo '        -H "Content-Type: application/json" \\' >> $GITHUB_STEP_SUMMARY
          echo '        -d '"'"'{"url": "${{ steps.deployment.outputs.webhook_url }}'"'"'' >> $GITHUB_STEP_SUMMARY
          echo "   ```" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "2. Test the bot by sending a WeChat article link" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Please check the logs above for details."
          echo "Target: telegram-wechat-bot @ account 23d4ff7e591eac740c917b5ab1ba23d3"
